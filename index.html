<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de Certificados — CPCE Mendoza</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="shell">

    <header class="app-header">
      <a href="https://cpcemza.org.ar" target="_blank" rel="noopener noreferrer" class="logo-link">
        <img src="https://cpcemza.org.ar/img/logo.png" alt="CPCE Mendoza" class="logo-img">
      </a>
      <div class="header-divider" aria-hidden="true"></div>
      <div class="header-title">
        <span class="header-title__sup">Consejo Profesional de Ciencias Económicas</span>
        <span class="header-title__main">Verificación de Certificados</span>
      </div>
    </header>

    <main class="card" id="appCard">
      <div class="progress-bar" id="progressBar" aria-hidden="true">
        <div class="progress-bar__fill" id="progressFill" style="width: 100%;"></div>
      </div>

      <section class="screen" id="loadingScreen">
        <div class="loader-container">
          <div class="loader-spinner-blue"></div>
          <p class="loader-text">Validando código de seguridad...</p>
        </div>
      </section>

      <section class="screen" id="errorScreen" style="display:none;">
        <div class="screen__header text-center">
          <div class="step-badge step-badge--warning">⚠️ Error de Conexión</div>
          <h2 class="screen__title">No se pudo verificar</h2>
          <p class="screen__desc" id="errorMsg">Ocurrió un problema al conectar con el servidor. Por favor, intente nuevamente.</p>
        </div>
        <button onclick="window.location.reload();" class="btn btn--primary btn--full mt-4">Reintentar</button>
      </section>

      <div id="resultadoContainer" style="display:none;"></div>

    </main>

    <footer class="app-footer">
      <span>© 2026 CPCE Mendoza</span>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a href="https://cpcemza.org.ar" target="_blank" rel="noopener noreferrer">cpcemza.org.ar</a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <span>Av. España 560, Mendoza</span>
    </footer>

  </div><script src="script.js"></script>
</body>
</html>
